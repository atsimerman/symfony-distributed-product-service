framework:
    messenger:
        # Catalog consumes nothing (PLAN.md §1) — no consumer transport yet.
        # symfony/amqp-messenger is still required here for Phase 4's outbox
        # relay, which publishes directly via AmqpStamp rather than a
        # queue-bound consumer transport.

        buses:
            messenger.bus.default:
                middleware:
                    # Inert until product-service actually dispatches/handles
                    # messages (Phase 4) — kept for parity with the other services.
                    - App\Messenger\CorrelationIdMiddleware

        transports:
            sync: 'sync://'

        routing:
            # Route your messages to the transports
            # 'App\Message\YourMessage': async

